<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .input-section {
            padding: 24px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        #todoInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .filters {
            display: flex;
            padding: 16px 24px;
            gap: 8px;
            border-bottom: 1px solid #e9ecef;
        }

        .filter-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #6c757d;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #e9ecef;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .todo-list {
            list-style: none;
            padding: 16px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f1f3f4;
            transition: background 0.2s;
        }

        .todo-item:hover {
            background: #f8f9fa;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #adb5bd;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #dee2e6;
            border-radius: 50%;
            margin-right: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: #667eea;
        }

        .todo-item.completed .checkbox {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            display: none;
        }

        .todo-item.completed .checkbox::after {
            display: block;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #212529;
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: #dee2e6;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #fee;
            color: #e74c3c;
        }

        .footer {
            padding: 16px 24px;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #6c757d;
        }

        .clear-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #6c757d;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #e9ecef;
            color: #e74c3c;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #adb5bd;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .todo-list::-webkit-scrollbar {
            width: 8px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .todo-list::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 待办事项</h1>
            <p id="dateDisplay"></p>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="todoInput" placeholder="添加新的待办事项..." maxlength="100">
                <button id="addBtn">添加</button>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="active">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="footer">
            <span id="itemCount">0 个项目</span>
            <button class="clear-btn" id="clearBtn">清除已完成</button>
        </div>
    </div>

    <script>
        // 状态管理
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all';

        // DOM 元素
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const itemCount = document.getElementById('itemCount');
        const clearBtn = document.getElementById('clearBtn');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const dateDisplay = document.getElementById('dateDisplay');

        // 显示日期
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        dateDisplay.textContent = new Date().toLocaleDateString('zh-CN', options);

        // 保存待办事项到本地存储
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // 生成唯一 ID
        function generateId() {
            return Date.now() + Math.random();
        }

        // 添加待办事项
        function addTodo() {
            const text = todoInput.value.trim();
            if (text) {
                todos.unshift({
                    id: generateId(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                });
                todoInput.value = '';
                saveTodos();
                render();
            }
            todoInput.focus();
        }

        // 切换完成状态
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                render();
            }
        }

        // 删除待办事项
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            render();
        }

        // 清除已完成
        function clearCompleted() {
            todos = todos.filter(t => !t.completed);
            saveTodos();
            render();
        }

        // 过滤待办事项
        function filterTodos() {
            switch (currentFilter) {
                case 'active':
                    return todos.filter(t => !t.completed);
                case 'completed':
                    return todos.filter(t => t.completed);
                default:
                    return todos;
            }
        }

        // 渲染列表
        function render() {
            const filteredTodos = filterTodos();

            if (filteredTodos.length === 0) {
                todoList.innerHTML = `
                    <li class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                        <p>${currentFilter === 'all' ? '暂无待办事项' : currentFilter === 'active' ? '没有进行中的事项' : '没有已完成的事项'}</p>
                    </li>
                `;
            } else {
                todoList.innerHTML = filteredTodos.map(todo => `
                    <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                        <div class="checkbox" onclick="toggleTodo(${todo.id})"></div>
                        <span class="todo-text">${escapeHtml(todo.text)}</span>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">×</button>
                    </li>
                `).join('');
            }

            const activeCount = todos.filter(t => !t.completed).length;
            const totalCount = todos.length;
            itemCount.textContent = `${activeCount}/${totalCount} 进行中`;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听
        addBtn.addEventListener('click', addTodo);

        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        clearBtn.addEventListener('click', clearCompleted);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // 初始渲染
        render();
    </script>
</body>
</html>
